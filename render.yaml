services:
  # Backend + Frontend (combined)
  - type: web
    name: beyound-chats-app
    env: node
    rootDir: .
    buildCommand: npm install --prefix Beyound_Chats
    startCommand: npm start --prefix Beyound_Chats
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: beyound-chats-db
          property: connectionString
      - key: GROQ_API_KEY
        generateValue: true
        sync: false

  # Worker (runs every 6 hours)
  - type: cron
    name: beyound-chats-worker
    env: node
    rootDir: NodeJS_project
    buildCommand: npm install
    startCommand: npm start
    schedule: "0 */6 * * *"
    timeZone: "Asia/Kolkata"
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_BASE_URL
        fromService:
          name: beyound-chats-app
          property: url
      - key: GROQ_API_KEY
        fromService:
          name: beyound-chats-app
          property: envVar GROQ_API_KEY
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: TEST_MODE
        value: false
      - key: USE_MANUAL_FALLBACK
        value: true

databases:
  - name: beyound-chats-db
    provider: postgres
    plan: free
    databaseName: beyound_chats
    user: beyound_chats_user
